name: ImageRater
options:
  bundleIdPrefix: com.imageRater
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_OBJC_BRIDGING_HEADER: "ImageRater/ImageRater-Bridging-Header.h"
    CLANG_ENABLE_OBJC_ARC: YES
targets:
  ImageRater:
    type: application
    platform: macOS
    sources:
      - path: ImageRater
        excludes:
          - "**/*.md"
    resources:
      - ImageRater/CoreData/ImageRater.xcdatamodeld
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imageRater.ImageRater
        INFOPLIST_FILE: ImageRater/Info.plist
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        OTHER_LDFLAGS: "-lraw"
        HEADER_SEARCH_PATHS: "/opt/homebrew/include"
        LIBRARY_SEARCH_PATHS: "/opt/homebrew/lib"
    dependencies: []
  ImageRaterTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ImageRaterTests
    resources:
      - ImageRaterTests/Fixtures
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imageRater.ImageRaterTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ImageRater.app/Contents/MacOS/ImageRater"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ImageRater
schemes:
  ImageRater:
    build:
      targets:
        ImageRater: all
        ImageRaterTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ImageRaterTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

name: Focal
options:
  bundleIdPrefix: com.focal
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_OBJC_BRIDGING_HEADER: "ImageRater/ImageRater-Bridging-Header.h"
    CLANG_ENABLE_OBJC_ARC: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Focal:
    type: application
    platform: macOS
    sources:
      - path: ImageRater
        excludes:
          - "**/*.md"
    resources:
      - ImageRater/CoreData/ImageRater.xcdatamodeld
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.focal.app
        INFOPLIST_FILE: ImageRater/Info.plist
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        OTHER_LDFLAGS: "-lraw"
        HEADER_SEARCH_PATHS: "/opt/homebrew/include"
        LIBRARY_SEARCH_PATHS: "/opt/homebrew/lib"
    preBuildScripts:
      - name: Regenerate FocalSettings+Generated.swift
        script: |
          cd "$PROJECT_DIR"
          /usr/bin/env python3 scripts/gen_defaults.py
        outputFiles:
          - $(SRCROOT)/ImageRater/App/FocalSettings+Generated.swift
    dependencies: []
  FocalTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ImageRaterTests
    resources:
      - ImageRaterTests/Fixtures
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.focal.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Focal.app/Contents/MacOS/Focal"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Focal
  FocalScorer:
    type: tool
    platform: macOS
    sources:
      - path: FocalScorer
      - path: ImageRater/Pipeline/RatingPipeline.swift
      - path: ImageRater/Pipeline/CLIPTextEmbeddings.swift
      - path: ImageRater/App/FocalSettings.swift
      - path: ImageRater/App/FocalSettings+Generated.swift
      - path: ImageRater/LibRaw/LibRawWrapper.swift
      - path: ImageRater/LibRaw/LibRawBridge.h
      - path: ImageRater/LibRaw/LibRawBridge.mm
      - path: ImageRater/Models/RatingResult.swift
    postBuildScripts:
      - name: Copy MLModels next to binary
        script: |
          set -e
          SRC="$SRCROOT/ImageRater/MLModels"
          DEST="$TARGET_BUILD_DIR"
          for m in topiq-nr topiq-swin clip-vision; do
            if [ -d "$SRC/$m.mlmodelc" ]; then
              rm -rf "$DEST/$m.mlmodelc"
              cp -R "$SRC/$m.mlmodelc" "$DEST/$m.mlmodelc"
            fi
          done
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.focal.scorer
        SWIFT_OBJC_BRIDGING_HEADER: "ImageRater/ImageRater-Bridging-Header.h"
        OTHER_LDFLAGS: "-lraw"
        HEADER_SEARCH_PATHS: "/opt/homebrew/include"
        LIBRARY_SEARCH_PATHS: "/opt/homebrew/lib"
        ARCHS: "arm64"
        ONLY_ACTIVE_ARCH: YES
        VALID_ARCHS: "arm64"
schemes:
  Focal:
    build:
      targets:
        Focal: all
        FocalTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FocalTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  FocalScorer:
    build:
      targets:
        FocalScorer: all
    run:
      config: Release
